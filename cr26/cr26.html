<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desenrola Brasil 2.0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .hero { 
      background: linear-gradient(135deg, #003087 0%, #00A84F 100%); 
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">

  <!-- NAV -->
  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <img src="https://desenrola.gov.br/gov.04de5c61d2617675.svg" alt="Gov.br" class="h-10">
        <span class="font-bold text-2xl text-emerald-600">Desenrola</span>
      </div>
      <a href="calculadora.html" 
         class="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-3 rounded-xl font-semibold transition">
        Entrar com gov.br
      </a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero text-white py-24">
    <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
      <div>
        <h1 class="text-5xl md:text-6xl font-bold leading-tight mb-6">
          Desenrole sua vida financeira
        </h1>
        <p class="text-xl mb-8 opacity-90">
          Negocie suas dívidas com grandes descontos, parcelamento facilitado e segurança do Governo Federal.
        </p>
        
        <!-- Botão atualizado -->
        <a href="calculadora.html" 
           class="inline-block bg-white text-emerald-700 hover:bg-gray-100 px-10 py-4 rounded-2xl text-lg font-semibold shadow-xl transition transform hover:scale-105">
          Calcular meu desconto agora
        </a>
      </div>
      
      <!-- Ilustração -->
      <img src="ilustra-home-5.svg" 
           alt="Pessoa negociando com celular" 
           class="w-full max-w-md mx-auto drop-shadow-2xl rounded-3xl">
    </div>
  </section>

</body>
</html>
